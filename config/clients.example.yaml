# cw client configuration
# See config/CONFIG_REFERENCE.md for all available fields
#
# Location: ~/.config/cw/clients.yaml
# (or $XDG_CONFIG_HOME/cw/clients.yaml)

clients:
  # Minimal config — only name and path required
  my-project:
    workspace_path: /path/to/your/repo
    default_branch: main

  # Full config with all options
  # my-other-project:
  #   workspace_path: /path/to/repo
  #   default_branch: main
  #   auto_purposes: [impl, idea, debt]    # which sessions auto-start (default: [idea, impl, debt])
  #   notifications: true                   # desktop notifications on session events
  #   auto_background_threshold: 50         # auto-background after N conversation turns
  #   purpose_prompts:                      # override default session prompts
  #     impl: "Custom implementation instructions..."
  #     idea: "Custom ideation instructions..."
  #   worktree_base: /path/to/worktrees     # base dir for git worktree isolation

  # Worktree mode — for multi-branch workflows from a shared repo
  # my-worktree-project:
  #   repo_path: /path/to/shared/repo
  #   branch: my-feature-branch
