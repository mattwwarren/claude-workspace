repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.1
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.12.5
          - click>=8.3.1
          - jinja2>=3.1.6
          - pyyaml>=6.0.3
          - types-PyYAML>=6.0
        args: [--strict, --python-version=3.13]
        pass_filenames: false
        entry: mypy src/

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: uv run pytest tests/ -x -q
        language: system
        pass_filenames: false
        always_run: true
